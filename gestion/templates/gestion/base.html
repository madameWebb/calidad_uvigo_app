{% load static %}
<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Calidade UVIGO{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'gestion/css/base.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
     <header>
        <div style="max-width: 1400px; margin: 0 auto; padding: var(--spacing-lg); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="{% static 'gestion/img/logob.png' %}" alt="Logo UVIGO" style="height: 60px; width: auto;">
                <h1 style="margin: 0; font-size: 28px; color: white;">Calidade UVIGO</h1>
            </div>
            <nav>
                <a href="{% url 'index' %}" style="color: white; margin-right: 20px; text-decoration: none;">Inicio</a>
                <a href="/admin/" style="color: white; text-decoration: none;">Área de xestión</a>
            </nav>
        </div>
    </header>
        
    <main>
        {% block contido %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer style="margin-top: 60px; padding: 20px; text-align: center; color: #666; border-top: 1px solid var(--color-border); font-size: 12px; display: flex; justify-content: center; align-items: center; gap: 15px;">
        <img src="{% static 'gestion/img/logo.png' %}" alt="Logo UVIGO" style="height: 40px; width: auto;">
        <p style="margin: 0;">Universidade de Vigo — Área de Calidade</p>
    </footer>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
