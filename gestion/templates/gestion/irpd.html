<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Calidad - UVigo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/bootstrap.min.css" rel="stylesheet"><style>
         .header-uvigo {
            background-color: #212529;
            color: white;
            padding: 25px 0;
            margin-bottom: 40px;
            border-bottom: 4px solid #0d6efd;
        }
        .table th {
            background-color: #343a40 !important;
            color: white !important;
            font-weight: 500;
        }
        
    </style>
</head>
<body class="bg-light">

    <header class="header-uvigo shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 mb-1">📊 Portal de Transparencia</h1>
                <p class="mb-0 text-muted small text-uppercase tracking-wider" style="color: #adb5bd !important;">Sistema de Indicadores de Calidad</p>
            </div>
            <a href="/admin/" class="btn btn-outline-light btn-sm px-3">
                🔐 Acceso Gestión
            </a>
        </div>
    </header>

    <main class="container my-5 d-flex justify-content-center">
        <div class="card shadow-sm border-0" style="width: 70%; min-width: 320px;">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0 w-100">
                        <thead>
                            <tr>
                                <th style="width: 25%;" class="text-end pe-4">Código</th>
                                <th style="width: 75%;">Denominación</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for ind in irpd %}
                            <tr>
                                <td class="text-end pe-4">
                                    <span class="fw-bold text-primary">{{ ind.codigo }}</span>
                                </td>
                                <td>
                                    <div class="fw-semibold text-dark">{{ ind.denominacion }}</div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="container text-center my-5 text-muted small">
        <p>© 2026 Universidad de Vigo - Aplicación de Calidad Interna</p>
    </footer>

</body>
</html>
